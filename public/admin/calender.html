<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Terminverwaltung</title>
    <link rel="stylesheet" href="../styles/admin/calender.css">
</head>
<body>
    <app-sidebar></app-sidebar>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>Event-Kalender</h1>
                <p>Plane und verwalte die nächsten Vereinstermine.</p>
            </div>
            <button class="add-btn" id="openEventModal">＋ Neuer Termin</button>
        </header>

        <section class="member-list-container">
            <table class="member-table">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Event</th>
                        <th>Ort</th>
                        <th style="text-align: right;">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="eventTableBody"></tbody>
            </table>
        </section>
    </main>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEventModal()">&times;</span>
            <h2 id="modalTitle">Termin planen</h2>
            <form id="eventForm">
                <input type="hidden" id="eventId">
                <div class="form-group">
                    <label>Titel des Events</label>
                    <input type="text" id="eventTitle" required placeholder="z.B. Jahreshauptversammlung">
                </div>
                <div class="form-group">
                    <label>Datum</label>
                    <input type="date" id="eventDate" required>
                </div>
                <div class="form-group">
                    <label>Ort / Location</label>
                    <input type="text" id="eventLocation" placeholder="Vereinsheim">
                </div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 2;">
                        <label>Straße</label>
                        <input type="text" id="eventStreet">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>PLZ</label>
                        <input type="text" id="eventZip">
                    </div>
                </div>
                <div class="form-group">
                    <label>Beschreibung</label>
                    <textarea id="eventDescription" rows="3" style="width:100%; border-radius:8px; border:1px solid var(--border-color); padding:10px;"></textarea>
                </div>
                <button type="submit" class="save-btn">Termin speichern</button>
            </form>
        </div>
    </div>

    <script src="../../src/components/sidebar.js"></script>
    <script src="../scripts/admin/calenderManagement.js"></script>
</body>
</html>
