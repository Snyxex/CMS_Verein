<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Terminverwaltung</title>
    <link rel="stylesheet" href="../styles/admin-core.css">
</head>
<body>
    <app-sidebar></app-sidebar>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>Event-Kalender</h1>
                <p>Plane und verwalte die nächsten Vereinstermine.</p>
            </div>
            <button class="add-btn" id="openEventModal">＋ Neuer Termin</button>
        </header>

        <section class="list-container">
            <div class="table-controls">
                <div class="filter-group">
                    <input type="text" id="eventSearch" placeholder="Event oder Ort suchen...">
                    
                    <select id="eventFilterMonth">
                        <option value="all">Alle Monate</option>
                        <option value="0">Januar</option>
                        <option value="1">Februar</option>
                        <option value="2">März</option>
                        <option value="3">April</option>
                        <option value="4">Mai</option>
                        <option value="5">Juni</option>
                        <option value="6">Juli</option>
                        <option value="7">August</option>
                        <option value="8">September</option>
                        <option value="9">Oktober</option>
                        <option value="10">November</option>
                        <option value="11">Dezember</option>
                    </select>

                    <select id="eventSortOrder">
                        <option value="asc">Älteste zuerst</option>
                        <option value="desc">Neueste zuerst</option>
                    </select>
                </div>
            </div>

            <table class="member-table">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Event</th>
                        <th>Ort</th>
                        <th style="text-align: right;">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="eventTableBody">
                    </tbody>
            </table>
        </section>
    </main>

    <div id="eventModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeEventModal()">&times;</span>
            <h2 id="modalTitle">Termin planen</h2>
            <form id="eventForm">
                <input type="hidden" id="eventId">
                
                <div class="form-group">
                    <label>Titel des Events</label>
                    <input type="text" id="eventTitle" placeholder="z.B. Jahreshauptversammlung" required>
                </div>

                <div class="form-group">
                    <label>Datum</label>
                    <input type="date" id="eventDate" required>
                </div>

                <div class="form-group">
                    <label>Ort / Location</label>
                    <input type="text" id="eventLocation" placeholder="Vereinsheim, Sportplatz...">
                </div>

                <div style="display: flex; gap: 15px;">
                    <div class="form-group" style="flex: 2;">
                        <label>Straße</label>
                        <input type="text" id="eventStreet">
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>PLZ</label>
                        <input type="text" id="eventZip">
                    </div>
                </div>

                <div class="form-group">
                    <label>Beschreibung</label>
                    <textarea id="eventDescription" rows="3" placeholder="Details zum Termin..."></textarea>
                </div>

                <button type="submit" class="save-btn">Termin speichern</button>
            </form>
        </div>
    </div>

    <script src="../../src/components/sidebar.js"></script>
    <script src="../scripts/admin/calenderManagement.js"></script>
</body>
</html>
