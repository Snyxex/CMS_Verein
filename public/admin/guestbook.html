<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gästebuch-Verwaltung</title>
    <link rel="stylesheet" href="../styles/admin/gb.css"> </head>
<body>
    <app-sidebar></app-sidebar>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>Gästebuch-Management</h1>
                <p>Hier kannst du Einträge prüfen und bei Bedarf löschen.</p>
            </div>
        </header>

        <section class="member-list-container">
            <div class="table-controls">
                <input type="text" id="gbSearch" placeholder="Nach Namen oder Nachricht suchen...">
            </div>
            
            <table class="member-table">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Name</th>
                        <th>Nachricht</th>
                        <th style="text-align: right;">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="gbTableBody">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="../../src/components/sidebar.js"></script>
    <script src="../scripts/admin/gbManagement.js"></script>
</body>
</html>
