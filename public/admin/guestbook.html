<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gästebuch Moderation</title>
    <link rel="stylesheet" href="../styles/admin-core.css">
</head>
<body>
    <app-sidebar></app-sidebar>

    <main class="main-content">
        <header class="page-header">
            <div>
                <h1>Gästebuch Moderation</h1>
                <p>Prüfe Einträge und entferne unpassende Nachrichten.</p>
            </div>
            </header>

        <section class="list-container">
            <div class="table-controls">
                <div class="filter-group">
                    <input type="text" id="gbSearch" placeholder="Name oder Nachricht suchen...">
                    
                    <select id="gbFilterMonth">
                        <option value="all">Alle Monate</option>
                        <option value="0">Januar</option>
                        <option value="1">Februar</option>
                        <option value="2">März</option>
                        <option value="3">April</option>
                        <option value="4">Mai</option>
                        <option value="5">Juni</option>
                        <option value="6">Juli</option>
                        <option value="7">August</option>
                        <option value="8">September</option>
                        <option value="9">Oktober</option>
                        <option value="10">November</option>
                        <option value="11">Dezember</option>
                    </select>

                    <select id="gbSortOrder">
                        <option value="desc">Neueste zuerst</option>
                        <option value="asc">Älteste zuerst</option>
                    </select>
                </div>
            </div>
            
            <table class="member-table">
                <thead>
                    <tr>
                        <th>Datum</th>
                        <th>Name</th>
                        <th>Nachricht</th>
                        <th style="text-align: right;">Aktionen</th>
                    </tr>
                </thead>
                <tbody id="gbTableBody">
                    </tbody>
            </table>
        </section>
    </main>

    <script src="../../src/components/sidebar.js"></script>
    <script src="../scripts/admin/gbManagement.js"></script>
</body>
</html>
